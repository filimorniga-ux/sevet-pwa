<body>
  <canvas id="particles-canvas"></canvas>

  <nav class="navbar" id="navbar">
    <a href="/" class="nav-logo">
      <img class="nav-logo-img" src="/assets/images/logo-sevet-banner.jpg" alt="SEVET San Alberto" />
      <span class="nav-logo-text">SE<span>VET</span></span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><button class="nav-close-btn" onclick="toggleNav()" aria-label="Cerrar menú">✕</button></li>
      <li><a href="/">Inicio</a></li>
      <li><a href="/pages/agendar.html">Agendar</a></li>
      <li><a href="#especialidades">Servicios</a></li>

      <span></span><span></span><span></span>
    </div>
  </nav>

  <section class="section-pad" style="margin-top:80px">
    <div class="section-header reveal">
      <p class="section-tag">Tienda Premium</p>
      <h1 class="section-title">Productos <span class="grad">Veterinarios</span></h1>

    <!-- Layout: Productos + Carrito -->
    <div class="tienda-layout reveal" id="tienda-container">
      <div class="products-grid" id="productsGrid"></div>
      <aside class="cart-sidebar" id="cartPanel">
        <h3 class="panel-title">🛒 Tu Carrito</h3>
        <div class="cart-empty">
          <span class="cart-empty-icon">🛍️</span>
          <p>Tu carrito está vacío</p>
        </div>
      </aside>
    </div>
  </section>

  <span class="cart-badge" id="cartBadge">0</span>

  <script type="module" src="/js/main.js"></script>
